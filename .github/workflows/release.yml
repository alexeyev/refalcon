name: Release

# Tag a commit (git tag v0.7.0 && git push --tags) to:
#   1. build the plugin,
#   2. attach the installable .zip to a GitHub Release, and
#   3. publish a custom plugin repository (updatePlugins.xml) to GitHub Pages,
#      so users get one-click install AND automatic updates inside the IDE.
#
# One-time setup in the repo: Settings -> Pages -> "Build and deployment" -> Source: GitHub Actions.
on:
  push:
    tags: [ "v*" ]
  workflow_dispatch:

permissions:
  contents: write   # create the GitHub Release
  pages: write      # publish the plugin repository to Pages
  id-token: write   # required by actions/deploy-pages

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Gradle (with caching)
        uses: gradle/actions/setup-gradle@v4

      - name: Build plugin
        run: ./gradlew buildPlugin

      - name: Locate built zip
        id: zip
        run: |
          ZIP=$(ls build/distributions/*.zip | head -1)
          echo "path=$ZIP" >> "$GITHUB_OUTPUT"
          echo "name=$(basename "$ZIP")" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.zip.outputs.path }}
          generate_release_notes: true

      - name: Generate plugin repository (updatePlugins.xml)
        env:
          SERVER_URL: ${{ github.server_url }}
          REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
          ZIP_NAME: ${{ steps.zip.outputs.name }}
        run: |
          mkdir -p site
          VERSION="${TAG#v}"
          DOWNLOAD="${SERVER_URL}/${REPO}/releases/download/${TAG}/${ZIP_NAME}"
          {
            echo '<plugins>'
            echo "  <plugin id=\"io.github.alexeyev.refalcon\" url=\"${DOWNLOAD}\" version=\"${VERSION}\">"
            echo '    <idea-version since-build="243"/>'
            echo '    <name>Refal-5 Lambda</name>'
            echo '    <description><![CDATA[Refal-5 Lambda language support: highlighting, navigation, quick docs, and a run configuration.]]></description>'
            echo '  </plugin>'
            echo '</plugins>'
          } > site/updatePlugins.xml
          {
            echo '<!doctype html><meta charset="utf-8"><title>Refal-5 Lambda plugin repository</title>'
            echo '<h1>Refal-5 Lambda &mdash; IntelliJ plugin repository</h1>'
            echo '<p>In the IDE: <b>Settings &rarr; Plugins &rarr; &#9881; &rarr; Manage Plugin Repositories</b>, then add this URL:</p>'
            echo '<pre>updatePlugins.xml</pre>'
            echo '<p>(Use the full URL of the <code>updatePlugins.xml</code> next to this page.)</p>'
          } > site/index.html
          echo "----- updatePlugins.xml -----"; cat site/updatePlugins.xml

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
